name: publish

# Auto-tag + release + crates.io publish when Cargo.toml's version changes on main.
#
# Bump the `version` in Cargo.toml and push to main; this creates the matching
# vX.Y.Z tag, runs the binary release, and publishes the crate to crates.io.
# (A tag pushed with GITHUB_TOKEN does NOT trigger release.yml's tag-push trigger
# — GitHub's recursion guard — so we call release.yml directly via workflow_call.
# No PAT required.)
#
# crates.io publish requires a `CRATES_IO_TOKEN` repo secret (Settings → Secrets
# and variables → Actions). Publishing only runs when this workflow creates a new
# tag for a Cargo.toml version bump; already-tagged versions are not retried from
# later pushes.

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.decide.outputs.created }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag when the version changed
        id: decide
        run: |
          set -u
          read_ver() { grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/'; }
          new="$(read_ver < Cargo.toml)"
          old="$(git show HEAD~1:Cargo.toml 2>/dev/null | read_ver || true)"
          tag="v${new}"
          echo "version=${new}" >> "$GITHUB_OUTPUT"

          if [ -z "${new}" ]; then
            echo "::error::could not read version from Cargo.toml"; exit 1
          fi
          if [ "${new}" = "${old}" ]; then
            echo "version unchanged (${new}); nothing to tag."
            echo "created=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists on the remote; skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "honya ${tag}"
          if ! git push origin "${tag}"; then
            echo "::error::failed to push ${tag}"; exit 1
          fi
          echo "Created and pushed ${tag}."
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: v${{ needs.tag.outputs.version }}
    secrets: inherit

  # Publish the crate to crates.io only for the new tag created by this run.
  # Already-tagged versions are skipped before this job starts.
  publish-crate:
    name: publish to crates.io
    needs: tag
    if: needs.tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout (the pushed commit — carries the Cargo.toml being published)
        uses: actions/checkout@v4

      - name: Decide whether this version needs publishing
        id: gate
        run: |
          set -u
          ver="${{ needs.tag.outputs.version }}"
          if [ -z "${ver}" ]; then
            echo "::error::could not read version from Cargo.toml"; exit 1
          fi
          # crates.io returns 200 for a published version, 404 otherwise.
          # `-w '%{http_code}'` prints 000 on a connection failure (caught by the else).
          code="$(curl -A "honya-release-workflow" -sS -o /dev/null \
                    -w '%{http_code}' "https://crates.io/api/v1/crates/honya/${ver}")"
          if [ "${code}" = "200" ]; then
            echo "honya ${ver} is already on crates.io; nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          elif [ "${code}" = "404" ]; then
            echo "honya ${ver} is not on crates.io; will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::unexpected crates.io status for honya ${ver}: HTTP ${code}"; exit 1
          fi

      - name: Install Rust toolchain
        if: steps.gate.outputs.publish == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo build
        if: steps.gate.outputs.publish == 'true'
        uses: Swatinem/rust-cache@v2

      # crates.io releases are immutable, so verify before the irreversible push.
      # Mirror CI exactly (clippy as the gate, not rustfmt).
      - name: Verify (clippy + tests)
        if: steps.gate.outputs.publish == 'true'
        run: |
          cargo clippy --all-targets --locked -- -D warnings
          cargo test --locked

      - name: Publish to crates.io
        if: steps.gate.outputs.publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          set -u
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::Missing CRATES_IO_TOKEN secret (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          cargo publish --locked

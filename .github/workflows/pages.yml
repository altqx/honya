name: pages

# Build the honya homepage (TanStack Start, prerendered to static) and deploy
# it to Cloudflare Pages. The prerendered output (web/.output/public) also
# carries install.sh / install.ps1 / _headers / _redirects from web/public.

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

# Never let two deploys to the same project run at once.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (prerender to .output/public)
        run: bun run build

      - name: Ensure Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages project create honya --production-branch main

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          command: pages deploy .output/public --project-name=honya --branch=main

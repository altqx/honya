name: ci

# Lint, test, and build on every push to main and on PRs — with the Cargo build
# cached (registry + compiled dependencies), so runs after the first only
# recompile what actually changed.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Cancel an in-flight CI run when a newer commit is pushed to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep other OS checks running when one fails.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    # Use aws-lc-sys prebuilt NASM objects on x86_64 Windows; no-op elsewhere.
    env:
      AWS_LC_SYS_PREBUILT_NASM: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Caches ~/.cargo (registry/git) and ./target, keyed on Cargo.lock + rustc.
      # The cache is shared across runs on main; the first run populates it.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Lints are platform-agnostic; run once.
      - name: Clippy (warnings = errors)
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --locked -- -D warnings

      # Tests run on every OS to cover platform-specific paths.
      - name: Test
        run: cargo test --locked

name: release

# Build cross-platform release binaries and attach them to the GitHub Release.
# Asset convention (must match web/public/install.sh exactly):
#   honya-<target>.tar.gz          (gzip tar containing a single executable named `honya`)
#   honya-<target>.tar.gz.sha256   (sha256 checksum line for the .tar.gz)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build and upload release binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          # Cargo package / binary name.
          bin: honya
          target: ${{ matrix.target }}
          # Produces honya-<target>.tar.gz (and a sibling .sha256 via `checksum`).
          archive: honya-$target
          checksum: sha256
          # Create the release if it does not exist, attach to the pushed tag.
          ref: refs/tags/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

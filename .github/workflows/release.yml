name: release

# Build cross-platform release binaries and attach them to the GitHub Release.
# Asset convention (must match install.sh + install.ps1
# web/public exactly — that's where the install scripts now live):
#   honya-<target>.tar.gz   (Unix executable `honya`)
#   honya-<target>.zip      (Windows executable `honya.exe`)
#   honya-<target>.sha256   (checksum line for the archive; no archive suffix)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release"
        required: true
        type: string
  # Invoked by publish.yml right after it auto-creates the tag on a version bump.
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
      - name: Create the GitHub Release
        uses: taiki-e/create-gh-release-action@v1
        with:
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # x86_64 Windows also covers ARM64 Windows through x64 emulation.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          # Build ARM64 Windows natively; aws-lc-sys cannot cross-compile here.
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    # Use aws-lc-sys bundled NASM objects on x86_64 Windows.
    env:
      AWS_LC_SYS_PREBUILT_NASM: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ inputs.tag || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build and upload release binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          # Cargo package / binary name.
          bin: honya
          target: ${{ matrix.target }}
          # Produces honya-<target>.tar.gz (and a sibling .sha256 via `checksum`).
          archive: honya-$target
          checksum: sha256
          # Attach to the release created above for this tag.
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HONYA_GITHUB_CLIENT_ID: ${{ vars.HONYA_GITHUB_CLIENT_ID }}
